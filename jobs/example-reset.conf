# ============================================================
#  EXAMPLE 1: continue a conversation when the limit next resets
# ============================================================
# Sends your prompt into a SPECIFIC existing conversation. If you're
# currently rate-limited, it waits for the reset Claude reports, then
# sends automatically.
#
# ------------------------------------------------------------
#  HOW TO FILL IN session_id AND cwd (do this first!)
# ------------------------------------------------------------
#  - session_id = which conversation to continue.
#  - cwd        = the PROJECT FOLDER that conversation lives in. This is
#                 the folder Claude was open in when you had that chat --
#                 NOT this scheduler's folder, and NOT the jobs folder.
#
#  You don't have to hunt for these. Let the tool find and copy them:
#     .\run.cmd --list                 (see all conversations)
#     .\run.cmd --list schedule        (only ones mentioning "schedule")
#     .\run.cmd --copy 1               (copies #1's session_id + cwd to clipboard)
#  Then paste (Ctrl+V) over the two lines below.
# ------------------------------------------------------------

mode: reset

session_id: PASTE-WITH-.\run.cmd --copy N
cwd: PASTE-WITH-.\run.cmd --copy N

skip_permissions: false
skip_permissions_hours: 6

prompts:
  Continue where we left off.
