# ============================================================
#  EXAMPLE JOB 1: run when the usage limit next resets
# ============================================================
# Use this when you are ALREADY rate-limited and want a prompt
# to fire automatically the moment the limit lifts.
# The script sends the prompt; if Claude replies "limit reached",
# it waits for the reset time Claude reports, then resends.

mode: reset

# --- Where does the prompt go? Pick ONE ---
# (a) New conversation:      leave continue/session_id as below.
# (b) Most recent chat:      set continue: true
# (c) A SPECIFIC chat:       fill session_id + cwd (get them from
#                            '.\run.cmd --list') and delete continue.
continue: false
# session_id: PASTE-FROM-.\run.cmd --list
# cwd: PASTE-FROM-.\run.cmd --list

# Permissions. Leave false for safety. Set true only if you want
# this batch to run tools unattended (no "allow?" prompts).
skip_permissions: false
skip_permissions_hours: 6

# One or more prompts, each on its own line under "prompts:".
prompts:
  Summarize what we changed today and list any TODOs left in the code.
