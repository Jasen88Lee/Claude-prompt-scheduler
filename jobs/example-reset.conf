# ============================================================
#  EXAMPLE 1: continue a conversation when the limit next resets
# ============================================================
# Sends your prompt into a SPECIFIC existing conversation. If you're
# currently rate-limited, it waits for the reset Claude reports, then
# sends automatically.
#
# Fill session_id + cwd from:  .\run.cmd --list   (add a word to filter)

mode: reset

session_id: PASTE-SESSION-ID-FROM-LIST
cwd: PASTE-CWD-FROM-LIST

skip_permissions: false
skip_permissions_hours: 6

prompts:
  Continue where we left off.
