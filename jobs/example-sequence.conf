# ============================================================
#  EXAMPLE JOB 3: run several prompts in order (limit-aware)
# ============================================================
# Prompts run one after another. If a usage limit is reached
# partway through, the script waits for the reset, then resends
# the prompt it was on and keeps going. Good for overnight batches.
#
# This example turns skip_permissions ON so the batch can run
# fully unattended — after 6 hours it auto-reverts to safe mode.

mode: sequence

# --- Where do the prompts go? Pick ONE ---
# (a) Same NEW conversation across all prompts:  continue: true (as below).
# (b) A SPECIFIC existing chat:                  fill session_id + cwd
#     (get them from '.\run.cmd --list') and delete continue.
continue: true
# session_id: PASTE-FROM-.\run.cmd --list
# cwd: PASTE-FROM-.\run.cmd --list

skip_permissions: true
skip_permissions_hours: 6

prompts:
  Add unit tests for the parser module and run them.
  Refactor the error-handling paths flagged by the tests.
  Update the README to document the new behavior.
  Do a final self-review and list anything still risky.
