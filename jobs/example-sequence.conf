# ============================================================
#  EXAMPLE 3: continue several conversations, in order
# ============================================================
# Each [step] sends a prompt into its own conversation and runs after
# the previous step finishes. If a usage limit is hit during any step,
# it waits for the reset, resends that step, then moves on.
#
# Get each session_id + cwd from:  .\run.cmd --list
#
# Tip: to send several prompts into the SAME conversation instead, give
# every [step] the same session_id + cwd (or set them once at the top
# and use a simple 'prompts:' list like the other examples).

mode: sequence

skip_permissions: false
skip_permissions_hours: 6

[step]
session_id: PASTE-SESSION-ID-FOR-CONVERSATION-A
cwd: PASTE-CWD-FOR-CONVERSATION-A
prompt: Continue where we left off in conversation A.

[step]
session_id: PASTE-SESSION-ID-FOR-CONVERSATION-B
cwd: PASTE-CWD-FOR-CONVERSATION-B
prompt: Now continue the follow-up work in conversation B.
