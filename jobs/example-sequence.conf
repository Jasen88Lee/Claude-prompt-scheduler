# ============================================================
#  EXAMPLE 3: continue several conversations, in order
# ============================================================
# Each [step] sends a prompt into its own conversation and runs after
# the previous step finishes. If a usage limit is hit during any step,
# it waits for the reset, resends that step, then moves on.
#
# ------------------------------------------------------------
#  HOW TO FILL IN EACH session_id AND cwd (do this first!)
# ------------------------------------------------------------
#  - session_id = which conversation this step continues.
#  - cwd        = the PROJECT FOLDER that conversation lives in -- the
#                 folder Claude was open in when you had that chat. NOT
#                 this scheduler's folder, and NOT the jobs folder.
#
#  Let the tool find and copy them for you:
#     .\run.cmd --list                 (see all conversations, numbered)
#     .\run.cmd --copy 1               (copies #1's session_id + cwd to clipboard)
#     .\run.cmd --copy 2               (copies #2, and so on)
#  Then paste (Ctrl+V) over the session_id/cwd lines in each [step].
#
#  Tip: to send several prompts into the SAME conversation, give every
#  [step] the same session_id + cwd (or set them once at the top and use
#  a plain 'prompts:' list like the other examples).
# ------------------------------------------------------------

mode: sequence

skip_permissions: false
skip_permissions_hours: 6

[step]
session_id: PASTE-CONVERSATION-A-WITH-.\run.cmd --copy N
cwd: PASTE-CONVERSATION-A-WITH-.\run.cmd --copy N
prompt: Continue where we left off in conversation A.

[step]
session_id: PASTE-CONVERSATION-B-WITH-.\run.cmd --copy N
cwd: PASTE-CONVERSATION-B-WITH-.\run.cmd --copy N
prompt: Now continue the follow-up work in conversation B.
