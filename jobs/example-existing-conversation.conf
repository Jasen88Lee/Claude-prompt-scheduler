# ============================================================
#  EXAMPLE JOB 4: target a SPECIFIC existing conversation
# ============================================================
# Use this when you want the prompt to land in a particular
# chat/code conversation you already have — not a new one, and
# not just "whatever was most recent."
#
# EASY WAY to fill in session_id + cwd below:
#   .\run.cmd --list                 (lists recent conversations)
#   .\run.cmd --list schedule        (filter by a word in the chat/path)
# Copy the session_id and cwd it prints for the conversation you want.

mode: reset

session_id: PASTE-SESSION-ID-FROM-LIST
cwd: PASTE-CWD-FROM-LIST

skip_permissions: false
skip_permissions_hours: 6

prompts:
  Continue where we left off.
