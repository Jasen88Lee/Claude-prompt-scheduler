# ============================================================
#  EXAMPLE JOB 4: target a SPECIFIC existing conversation
# ============================================================
# Use this when you want the prompt to land in a particular
# chat/code conversation you already have open — not a new one,
# and not just "whatever was most recent."
#
# HOW TO FIND session_id:
#   Open File Explorer to:
#     %USERPROFILE%\.claude\projects\<encoded-project-path>\
#   Each conversation is a "<session_id>.jsonl" file. Sort by
#   "Date modified" to find the one you mean, and copy its name
#   (without .jsonl) into session_id below.
#
# cwd MUST be the project folder that conversation belongs to.

mode: reset

session_id: PASTE-THE-CONVERSATION-ID-HERE
cwd: C:\Users\Jasen Lee\path\to\that\project

skip_permissions: false
skip_permissions_hours: 6

prompts:
  Continue where we left off.
