# ============================================================
#  EXAMPLE JOB 2: run at a specific clock time
# ============================================================
# The script sleeps quietly until run_at, then sends the prompt(s).
# If a usage limit is hit at that time, it still waits for the
# reset and then continues. Time is your LOCAL time, 24-hour clock.

mode: time
run_at: 2026-07-03 09:00

# --- Where does the prompt go? Pick ONE ---
# (a) New conversation:      leave continue as below.
# (b) Most recent chat:      set continue: true
# (c) A SPECIFIC chat:       fill session_id + cwd (get them from
#                            '.\run.cmd --list') and delete continue.
continue: false
# session_id: PASTE-FROM-.\run.cmd --list
# cwd: PASTE-FROM-.\run.cmd --list

skip_permissions: false
skip_permissions_hours: 6

prompts:
  Review the open pull requests and write a short status summary for each.
