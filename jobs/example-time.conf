# ============================================================
#  EXAMPLE 2: continue a conversation at a specific clock time
# ============================================================
# Sleeps quietly until run_at, then sends your prompt into a SPECIFIC
# existing conversation. If a limit is hit at that time, it waits for
# the reset and then continues. run_at is your LOCAL time, 24-hour clock.
#
# Fill session_id + cwd from:  .\run.cmd --list   (add a word to filter)

mode: time
run_at: 2026-07-03 09:00

session_id: PASTE-SESSION-ID-FROM-LIST
cwd: PASTE-CWD-FROM-LIST

skip_permissions: false
skip_permissions_hours: 6

prompts:
  Continue where we left off.
